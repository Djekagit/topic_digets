name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TG_TOKEN: test-token
      ADMIN_IDS: "1"
      OPENROUTER_API_KEY: test-key
      DATABASE_URL: postgresql+asyncpg://user:password@localhost/topic_digests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -z "${SERVER_PORT}" ]; then SERVER_PORT=22; fi
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${SERVER_PORT}" ]; then SERVER_PORT=22; fi
          if [ -z "${APP_DIR}" ]; then APP_DIR=/opt/topic_digests; fi
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "cd '$APP_DIR' && \
             git fetch origin main && \
             git checkout main && \
             git pull --ff-only origin main && \
             mkdir -p logs backups && \
             docker compose up -d --build --remove-orphans && \
             docker image prune -f && \
             docker compose ps"
